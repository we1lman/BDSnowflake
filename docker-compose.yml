services:
  postgres:
    image: postgres:16
    container_name: bigdata_lab_postgres
    restart: always
    environment:
      POSTGRES_DB: bigdata_lab
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
      - "./исходные данные:/csv_data"

volumes:
  postgres_data: